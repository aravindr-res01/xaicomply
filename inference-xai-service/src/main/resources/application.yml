server:
  port: 8082

spring:
  application:
    name: inference-xai-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ── ONNX model path (generated by train_model.py) ─────────────────────────────
onnx:
  model:
    path: classpath:model/fraud_model.onnx

# ── Python explainer sidecar ──────────────────────────────────────────────────
services:
  python-explainer:
    url: http://localhost:8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: inference-xai-service

logging:
  level:
    root: INFO
    com.xaicomply: DEBUG
    ai.onnxruntime: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] [%X{transactionId:-no-txId}] %-5level %logger{36} - %msg%n"
  file:
    name: ../logs/inference-xai-service.log

# ── Swagger / OpenAPI ──────────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true
  show-actuator: false

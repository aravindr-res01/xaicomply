server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: preprocessing-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ── Downstream service URLs ────────────────────────────────────────────────────
services:
  inference:
    url: http://localhost:8082
  mapping:
    url: http://localhost:8083
  reporting:
    url: http://localhost:8084

# ── Scaler stats path (generated by train_model.py) ───────────────────────────
scaler:
  stats:
    path: classpath:model/scaler_stats.json

# ── Actuator + Prometheus ──────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      service: preprocessing-service
      version: "1.0.0"

# ── Logging ────────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.xaicomply: DEBUG
    org.springframework.web.client: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] [%X{transactionId:-no-txId}] %-5level %logger{36} - %msg%n"
  file:
    name: ../logs/preprocessing-service.log

# ── Swagger / OpenAPI ──────────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true
  show-actuator: false
